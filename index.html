<html>
    <head>

	<meta charset="UTF-8">

	<title>LED方向幕シミュレーター</title>

	<link rel="stylesheet" href="style.css">

    </head>

    <body>

    	<header>

        	<h1>LED方向幕シミュレーター</h1>

    	</header>

    	<div class="container">

            <aside>

				<label id="type">種別</label>
				<div id="typeButtons" class="buttonGroup"></div>

				<label id="destination">行先</label>
				<div id="destinationButtons" class="buttonGroup"></div>

				<label id="information">案内</label>
				<div id="informationButtons" class="buttonGroup"></div>

				<label id="nextMode">次駅</label>
				<div id="nextModeButtons" class="buttonGroup"></div>
		
            </aside>

            <main>

				<div class="ledFrame">

            	    <canvas id="led" width="895" height="223"></canvas>

				</div>
			
			</main>

        </div>

        <footer id="status">
            待機中
        </footer>

	<script src="state.js"></script>
	<script src="constants.js"></script>
	<script src="dom.js"></script>
	<script src="json.js"></script>
	<script src="buttons.js"></script>
	<script src="display.js"></script>
	<script src="render.js"></script>
    <script src="script.js"></script>

    </body>

</html>
