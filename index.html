<html>
    <head>

	<meta charset="UTF-8">

	<title>LED方向幕シミュレーター</title>

	<link rel="stylesheet" href="style.css">

    </head>

    <body>

    	<header>

        	<h1>LED方向幕シミュレーター</h1>

    	</header>

		<div id="vehicleSelector">

			<label id="vehicle">車両を選択</label>
			<div id="vehicleSelect" class="selectGroup"></div>

		</div>

		<div id="simulator" hidden>

			<div class="container">

				<aside>
					
					<div id="typeGroup">
						<label id="type">種別</label>
						<div id="typeButtons" class="buttonGroup"></div>
					</div>

					<div id="destinationGroup">
						<label id="destination">行先</label>
						<div id="destinationButtons" class="buttonGroup"></div>
					</div>

					<div id="informationGroup">
						<label id="information">案内</label>
						<div id="informationButtons" class="buttonGroup"></div>
					</div>

					<div id="information2Group">
						<label id="information2">案内2</label>
						<div id="information2Buttons" class="buttonGroup"></div>
					</div>

					<div id="nextModeGroup">
						<label id="nextMode">次駅</label>
						<div id="nextModeButtons" class="buttonGroup"></div>
					</div>

					<div id="carNumberGroup">
						<label id="nextMode">号車</label>
						<div id="carNumberButtons" class="buttonGroup"></div>
					</div>

					<button id="vehicleSelectButton">車両選択に戻る</button>
			
				</aside>

				<main>

					<div class="ledFrame">

						<canvas id="led" width="895" height="223"></canvas>

					</div>
				
				</main>

        	</div>
		
		</div>

        <footer id="status">
        </footer>

	<script src="js/state.js"></script>
	<script src="js/constants.js"></script>
	<script src="js/dom.js"></script>
	<script src="js/json.js"></script>
	<script src="js/buttons.js"></script>
	<script src="js/display.js"></script>
	<script src="js/render.js"></script>
	<script src="js/vehicle.js"></script>
    <script src="js/script.js"></script>

    </body>

</html>
